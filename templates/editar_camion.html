<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Camión</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            color: white;
        }

        .container {
            max-width: 700px;
            margin: auto;
            padding: 30px 20px 60px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 24px;
        }

        .back {
            display: inline-block;
            margin-bottom: 18px;
            text-decoration: none;
            color: white;
            background: #334155;
            padding: 10px 14px;
            border-radius: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.10);
            color: white;
        }

        option {
            color: black;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <a class="back" href="/panel-admin/transporte/">← Volver</a>

    <div class="card">
        <h1>Editar camión</h1>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="nombre" value="{{ camion.nombre }}" required>

            <select name="tipo" required>
                <option value="ida" {% if camion.tipo == 'ida' %}selected{% endif %}>Ida</option>
                <option value="regreso" {% if camion.tipo == 'regreso' %}selected{% endif %}>Regreso</option>
            </select>

            <select name="estado" required>
                <option value="pendiente" {% if camion.estado == 'pendiente' %}selected{% endif %}>Pendiente</option>
                <option value="saliendo" {% if camion.estado == 'saliendo' %}selected{% endif %}>Saliendo</option>
                <option value="en_camino" {% if camion.estado == 'en_camino' %}selected{% endif %}>En camino</option>
                <option value="llegando" {% if camion.estado == 'llegando' %}selected{% endif %}>Llegando</option>
                <option value="llego" {% if camion.estado == 'llego' %}selected{% endif %}>Llegó</option>
            </select>

            <select name="encargado">
                <option value="">Encargado</option>
                {% for m in madrijim %}
                    <option value="{{ m.id }}" {% if camion.encargado and camion.encargado.id == m.id %}selected{% endif %}>
                        {{ m.nombre }}
                    </option>
                {% endfor %}
            </select>

            <input type="text" name="hora_salida" value="{{ camion.hora_salida }}">
            <input type="text" name="hora_estimada" value="{{ camion.hora_estimada }}">
            <textarea name="link_ruta">{{ camion.link_ruta }}</textarea>

            <button class="btn" type="submit">Guardar cambios</button>
        </form>
    </div>
</div>
</body>
</html>
