<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Picture Day Público</title>
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
.container { max-width:1100px; margin:auto; padding:30px 20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:18px; }
.card { background:rgba(255,255,255,.08); border-radius:18px; overflow:hidden; }
.card img { width:100%; height:240px; object-fit:cover; }
.info { padding:14px; }
.btn { background:#334155; color:white; padding:10px 14px; border-radius:10px; text-decoration:none; font-weight:bold; display:inline-block; margin-bottom:18px; }
.muted { color:#cbd5e1; font-size:13px; }
</style>
</head>
<body>
<div class="container">

    <a class="btn" href="/">← Inicio</a>

    <h1>📸 Picture Day</h1>

    <div class="grid">
        {% for f in fotos %}
            <div class="card">
                <img src="{{ f.archivo.url }}">
                <div class="info">
                    <strong>{{ f.pedido.kbutza.nombre }}</strong><br>
                    {{ f.pedido.titulo }}
                    <div class="muted">
                        Subido por:
                        {% if f.subido_por %}
                            {{ f.subido_por.nombre }}
                        {% else %}
                            Desconocido
                        {% endif %}
                    </div>
                </div>
            </div>
        {% empty %}
            <p>No hay fotos todavía.</p>
        {% endfor %}
    </div>

</div>
</body>
</html>
