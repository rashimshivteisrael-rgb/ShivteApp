<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Subir Foto</title>
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
.container { max-width:500px; margin:auto; padding:50px 20px; }
.card { background:rgba(255,255,255,0.08); border-radius:20px; padding:24px; }
input { width:100%; padding:12px; margin-bottom:14px; border-radius:10px; border:none; box-sizing:border-box; }
button { width:100%; padding:13px; border:none; border-radius:10px; background:#22c55e; color:white; font-weight:bold; }
.back { display:inline-block; margin-bottom:18px; color:white; text-decoration:none; background:#334155; padding:10px 14px; border-radius:10px; }
</style>
</head>
<body>
<div class="container">
    <a class="back" href="/fotos/">← Fotos</a>

    <div class="card">
        <h1>Subir foto</h1>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="text" name="titulo" placeholder="Título opcional">
            <input type="file" name="imagen" accept="image/*" required>
            <button type="submit">Subir foto</button>
        </form>
    </div>
</div>
</body>
</html>
