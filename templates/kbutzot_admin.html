<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kbutzot</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 30px 20px 70px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .back {
            text-decoration: none;
            color: white;
            background: #334155;
            padding: 10px 14px;
            border-radius: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .item {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 18px;
            display: block;
            box-shadow: 0 8px 25px rgba(0,0,0,0.22);
            transition: transform .18s ease, background .18s ease;
        }

        .item:hover {
            background: rgba(255,255,255,0.13);
            transform: translateY(-4px);
        }

        .item strong {
            display: block;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .item span {
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.5;
        }

        .add-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 62px;
            height: 62px;
            background: #22c55e;
            border-radius: 50%;
            font-size: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(34,197,94,0.4);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 25px;
            border-radius: 18px;
            width: 90%;
            max-width: 420px;
        }

        input {
            width: 100%;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .close {
            margin-top: 10px;
            text-align: center;
            color: #94a3b8;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="topbar">
        <h1>🏠 Kbutzot</h1>
        <a class="back" href="/panel-admin/">← Panel</a>
    </div>

    <div class="grid">
        {% for k in kbutzot %}
            <a class="item" href="/panel-admin/kbutzot/{{ k.id }}/">
                <strong>{{ k.nombre }}</strong>
                <span>
                    {% if k.madrijim %}
                        {{ k.madrijim|join:", " }}
                    {% else %}
                        Sin madrijim asignados
                    {% endif %}
                </span>
            </a>
        {% empty %}
            <p>No hay kbutzot todavía.</p>
        {% endfor %}
    </div>
</div>

<div class="add-btn" onclick="abrirModal()">+</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2>Agregar Kbutza</h2>

        <form method="POST" action="/panel-admin/kbutzot/">
            {% csrf_token %}
            <input type="text" name="nombre" placeholder="Nombre de la kbutza" required>
            <input type="text" name="cuarto" placeholder="Cuarto">
            <button class="save-btn" type="submit">Guardar</button>
        </form>

        <div class="close" onclick="cerrarModal()">Cancelar</div>
    </div>
</div>

<script>
function abrirModal() {
    document.getElementById('modal').style.display = 'flex';
}

function cerrarModal() {
    document.getElementById('modal').style.display = 'none';
}
</script>

</body>
</html>
