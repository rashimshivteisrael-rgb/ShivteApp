<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
            color: white;
        }

        .container {
            max-width: 450px;
            margin: auto;
            padding: 80px 20px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 28px;
        }

        h1 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.10);
            color: white;
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .back {
            display: inline-block;
            margin-bottom: 18px;
            text-decoration: none;
            color: white;
            background: #334155;
            padding: 10px 14px;
            border-radius: 10px;
        }

        .error {
            background: rgba(239,68,68,0.18);
            color: #fecaca;
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <a class="back" href="/">← Inicio</a>

    <div class="card">
        <h1>Login</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button class="btn" type="submit">Entrar</button>
        </form>
    </div>
</div>
</body>
</html>
